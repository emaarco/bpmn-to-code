# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/platforms.html#sub::toml-dependencies-format

[versions]
kotlin = "2.3.20"
kotlinpoet = "2.3.0"
javapoet = "0.14.0"
camunda = "7.24.0"
jUnit = "6.0.3"
assertJ = "4.0.0-M1"
junitPlatformLauncher = "6.0.3"
mockk = "1.14.9"
ktor = "3.4.2"
kotlinxSerialization = "1.11.0"
logback = "1.5.32"
mcpKotlinSdk = "0.11.1"
shadow = "9.4.1"
slf4j = "2.0.17"
kotlinLogging = "8.0.01"
konsist = "0.17.3"
dokka = "2.0.0"
detekt = "1.23.7"

[libraries]
# Plugin dependencies
mavenPluginApi = { module = "org.apache.maven:maven-plugin-api", version = "3.9.15" }
mavenPluginAnnotations = { module = "org.apache.maven.plugin-tools:maven-plugin-annotations", version = "3.15.2" }
# Production dependencies
kotlinpoet = { module = "com.squareup:kotlinpoet", version.ref = "kotlinpoet" }
javapoet = { module = "com.palantir.javapoet:javapoet", version.ref = "javapoet" }
bpmnmodel = { module = "org.camunda.bpm.model:camunda-bpmn-model", version.ref = "camunda" }

# Web module dependencies
ktorServerCore = { module = "io.ktor:ktor-server-core", version.ref = "ktor" }
ktorServerNetty = { module = "io.ktor:ktor-server-netty", version.ref = "ktor" }
ktorServerContentNegotiation = { module = "io.ktor:ktor-server-content-negotiation", version.ref = "ktor" }
ktorSerializationKotlinxJson = { module = "io.ktor:ktor-serialization-kotlinx-json", version.ref = "ktor" }
ktorServerCors = { module = "io.ktor:ktor-server-cors", version.ref = "ktor" }
ktorServerCallLogging = { module = "io.ktor:ktor-server-call-logging", version.ref = "ktor" }
ktorServerStatusPages = { module = "io.ktor:ktor-server-status-pages", version.ref = "ktor" }
ktorServerSwagger = { module = "io.ktor:ktor-server-swagger", version.ref = "ktor" }
ktorServerOpenapi = { module = "io.ktor:ktor-server-openapi", version.ref = "ktor" }
ktorServerTestHost = { module = "io.ktor:ktor-server-test-host", version.ref = "ktor" }
kotlinxSerializationJson = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "kotlinxSerialization" }
logbackClassic = { module = "ch.qos.logback:logback-classic", version.ref = "logback" }
slf4jApi = { module = "org.slf4j:slf4j-api", version.ref = "slf4j" }
kotlinLogging = { module = "io.github.oshai:kotlin-logging-jvm", version.ref = "kotlinLogging" }
mcpKotlinSdk = { module = "io.modelcontextprotocol:kotlin-sdk", version.ref = "mcpKotlinSdk" }

# Testing dependencies
konsist = { module = "com.lemonappdev:konsist", version.ref = "konsist" }
junit = { module = "org.junit.jupiter:junit-jupiter", version.ref = "jUnit" }
assertj = { module = "org.assertj:assertj-core", version.ref = "assertJ" }
junitPlatformLauncher = { module = "org.junit.platform:junit-platform-launcher", version.ref = "junitPlatformLauncher" }
mockk = { module = "io.mockk:mockk", version.ref = "mockk" }

[bundles]
codegen = ["kotlinpoet", "javapoet"]
testing = ["junit", "junitPlatformLauncher", "assertj", "mockk"]
ktor = ["ktorServerCore", "ktorServerNetty", "ktorServerContentNegotiation", "ktorSerializationKotlinxJson", "ktorServerCors", "ktorServerCallLogging", "ktorServerStatusPages", "ktorServerSwagger", "ktorServerOpenapi"]

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
gradlePluginPublish = { id = "com.gradle.plugin-publish", version = "2.1.1" }
mavenPluginDevelopment = { id = "org.gradlex.maven-plugin-development", version = "1.0.3" }
mavenPublish = { id = "com.vanniktech.maven.publish", version = "0.36.0" }
ktor = { id = "io.ktor.plugin", version.ref = "ktor" }
shadow = { id = "com.gradleup.shadow", version.ref = "shadow" }
dokka = { id = "org.jetbrains.dokka", version.ref = "dokka" }
detekt = { id = "io.gitlab.arturbosch.detekt", version.ref = "detekt" }

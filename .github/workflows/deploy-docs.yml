name: Deploy Documentation

# Docs ship as part of the orchestrated release pipeline (publish-all.yml), which
# calls this workflow after the release approval gate. The standalone
# `release: published` trigger was removed so docs no longer deploy as a second,
# ungated reaction to a release. `workflow_dispatch` remains for manual redeploys.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, do not deploy to Pages)'
        type: boolean
        default: false
  workflow_call:
    inputs:
      dry_run:
        description: 'Dry run (build only, do not deploy to Pages)'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Enforce pinned npm dependencies
        uses: miragon/pin-npm-dependencies@v1
        with:
          root-path: docs

      - name: Install Dependencies
        run: npm ci
        working-directory: docs

      - name: Build Site
        run: npm run build
        working-directory: docs

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    if: inputs.dry_run != true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

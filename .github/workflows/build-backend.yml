name: Backend Build

on:
  pull_request:
    branches: [ main ]

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      # Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Step 2: Check if backend files changed
      - name: Check for backend changes
        id: filter
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- \
            'bpmn-to-code-core/' \
            'bpmn-to-code-gradle/' \
            'bpmn-to-code-maven/' \
            'bpmn-to-code-mcp/' \
            'bpmn-to-code-testing/' \
            'bpmn-to-code-web/' \
            'build.gradle.kts' \
            'settings.gradle.kts' \
            'gradle/libs.versions.toml' \
            '.github/workflows/build-backend.yml')
          if [ -n "$CHANGED" ]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build with Gradle
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      # Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v6

      # Step 2: Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # Step 3: Set up JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 4: Run Gradle build
      - name: Run Gradle Build
        run: ./gradlew build --warning-mode all

      # Step 5: Enforce per-class test coverage (≥ 80%)
      - name: Check Coverage
        run: ./gradlew :bpmn-to-code-core:jacocoTestCoverageVerification

      # Step 6: Post coverage summary as PR comment
      - name: Post Coverage Comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPORT="bpmn-to-code-core/build/reports/jacoco/test/jacocoTestReport.xml"
          [ -f "$REPORT" ] || exit 0
          COVERAGE=$(python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          root = ET.parse("bpmn-to-code-core/build/reports/jacoco/test/jacocoTestReport.xml").getroot()
          line = next((c for c in root.findall("counter") if c.get("type") == "LINE"), None)
          if line is None:
              print("n/a")
          else:
              covered, missed = int(line.get("covered", 0)), int(line.get("missed", 0))
              total = covered + missed
              pct = round(covered * 100 / total, 1) if total > 0 else 0.0
              print(f"{pct}% ({covered}/{total} lines)")
          EOF
          )
          MARKER="<!-- bpmn-to-code-coverage -->"
          BODY="${MARKER}
          **Coverage (bpmn-to-code-core):** ${COVERAGE}"
          # Delete any existing coverage comment before posting a fresh one
          gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | contains("<!-- bpmn-to-code-coverage -->")) | .id' | \
            xargs -I{} gh api --method DELETE "repos/${{ github.repository }}/issues/comments/{}"
          gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY"

name: Release

# One pipeline: release-please opens/updates the Release PR and, on its merge,
# creates the GitHub Release + tag. The publish jobs run in the *same* workflow
# run via `needs` + `release_created`, instead of a separate workflow reacting to
# a `release: published` event. A manual `dry_run` dispatch exercises the publish
# pipeline in build/verify-only mode without creating a release.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false
        description: "Dry run (build & verify only — no PR, no release, no publish)"

# Union of what release-please (contents/pull-requests) and the docs deploy
# (pages/id-token) require.
permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  release-please:
    name: Open or update Release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - id: rp
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: ${{ inputs.dry_run || false }}
          skip-github-release: ${{ inputs.dry_run || false }}

  # Human approval gate. The `release` environment has a required reviewer, so the
  # whole pipeline pauses here until the deployment is approved. A job that calls a
  # reusable workflow via `uses:` cannot also declare `environment:`, hence this
  # dedicated no-op job — approving it once unblocks every downstream publish.
  # Runs only for a real release, or for a manual dry run.
  gate:
    name: Await release approval
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || inputs.dry_run == true }}
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Approved
        run: echo "Release approved — proceeding to publish."

  # Maven Central first — the Gradle plugin declares bpmn-to-code-runtime as an
  # implementation dep in consuming projects, so the runtime artifact must be
  # resolvable before the plugin is published to the Plugin Portal.
  publish-maven:
    name: Publish to Maven Central
    needs: gate
    uses: ./.github/workflows/publish-to-maven.yml
    secrets: inherit
    with:
      dry_run: ${{ inputs.dry_run == true }}

  # Relocation POMs for the old io.github.emaarco coordinates — published with the personal token
  # that owns that namespace. Independent of the plugin chain, so it only needs the gate.
  publish-maven-relocation:
    name: Publish io.github.emaarco relocation POMs
    needs: gate
    uses: ./.github/workflows/publish-to-maven-relocation.yml
    secrets: inherit
    with:
      dry_run: ${{ inputs.dry_run == true }}

  publish-gradle:
    name: Publish to Gradle Plugin Portal
    needs: publish-maven
    uses: ./.github/workflows/publish-to-gradle.yml
    secrets: inherit
    with:
      dry_run: ${{ inputs.dry_run == true }}

  publish-docker:
    name: Publish to Docker Hub
    needs: gate
    uses: ./.github/workflows/publish-to-docker.yml
    secrets: inherit
    with:
      dry_run: ${{ inputs.dry_run == true }}

  deploy-docs:
    name: Deploy Documentation
    needs: gate
    uses: ./.github/workflows/deploy-docs.yml
    with:
      dry_run: ${{ inputs.dry_run == true }}

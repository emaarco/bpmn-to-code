name: Publish to Maven Central (io.miragon)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build & verify only, no real publish)'
        type: boolean
        default: false
  workflow_call:
    inputs:
      dry_run:
        description: 'Dry run (build & verify only, no real publish)'
        type: boolean
        default: false

jobs:
  publish:

    runs-on: ubuntu-latest

    env:
      ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
      # io.miragon is an org-owned Central namespace — uses the org token, not the personal one.
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MIRAGON_SONATYPE_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MIRAGON_SONATYPE_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build & Test
        run: ./gradlew build --warning-mode all

      # Only the real io.miragon artifacts here. The io.github.emaarco relocation POMs are published
      # separately (publish-to-maven-relocation.yml) with the personal token that owns that namespace.
      - name: Publish to Maven Central
        if: inputs.dry_run != true
        run: >-
          ./gradlew --no-configuration-cache -PsignArtifacts=true
          :bpmn-to-code-runtime:publishAndReleaseToMavenCentral
          :bpmn-to-code-maven:publishAndReleaseToMavenCentral
          :bpmn-to-code-testing:publishAndReleaseToMavenCentral

      - name: Publish to Maven Local (Dry Run)
        if: inputs.dry_run == true
        run: >-
          ./gradlew --no-configuration-cache
          :bpmn-to-code-runtime:publishToMavenLocal
          :bpmn-to-code-maven:publishToMavenLocal
          :bpmn-to-code-testing:publishToMavenLocal

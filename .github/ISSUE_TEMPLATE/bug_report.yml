name: Bug Report
description: Report a bug or unexpected behaviour in bpmn-to-code
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in the details below to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: When generating code from a BPMN with multiple pools, the plugin throws an exception and no code is produced...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behaviour.
      placeholder: |
        1. Add the bpmn-to-code Gradle plugin to your build
        2. Place a BPMN file with multiple pools under `src/main/resources`
        3. Run `./gradlew generateProcessApi`
        4. Observe the following error in the build output...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened? Include logs, stack traces, or screenshots if relevant.
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin Version
      placeholder: "1.2.0"
    validations:
      required: false

  - type: dropdown
    id: build-tool
    attributes:
      label: Build Tool
      options:
        - Gradle
        - Maven
        - Web UI
        - Other
    validations:
      required: false

  - type: dropdown
    id: process-engine
    attributes:
      label: Process Engine
      options:
        - Camunda 7
        - Zeebe
        - Operaton
        - Not applicable
    validations:
      required: false

  - type: dropdown
    id: output-language
    attributes:
      label: Output Language
      options:
        - Kotlin
        - Java
        - Not applicable
    validations:
      required: false

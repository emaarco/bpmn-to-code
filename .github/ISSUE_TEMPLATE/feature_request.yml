name: Feature Request
description: Suggest a new feature or enhancement for bpmn-to-code
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please describe what you'd like to see and why it would be useful.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the feature you are requesting.
      placeholder: As a developer, I want the plugin to generate type-safe constants for BPMN error codes so that I don't have to reference raw strings in my error handlers...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?
      placeholder: Currently, error code values from BPMN error events are not included in the generated API. Referencing them as raw strings is error-prone and breaks when BPMN models are renamed.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should the feature work? Include any BPMN/process-specific details.
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What conditions must be met for this feature to be considered complete?
      placeholder: |
        - [ ] Error code values from BPMN error events appear as constants in the generated API
        - [ ] Constants follow the existing UPPER_SNAKE_CASE naming convention
        - [ ] Works for both Camunda 7 and Zeebe engine targets
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or approaches you've considered?
    validations:
      required: false

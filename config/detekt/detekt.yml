build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

complexity:
  active: true
  CyclomaticComplexMethod:
    active: true
    threshold: 15
  LongMethod:
    active: true
    threshold: 60
  LargeClass:
    active: true
    threshold: 600
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 15
    thresholdInInterfaces: 10
    thresholdInObjects: 15
    thresholdInEnums: 10

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - Error
      - Exception
      - RuntimeException
      - Throwable
  SwallowedException:
    active: true
  NotImplementedDeclaration:
    active: true

potential-bugs:
  active: true
  UnsafeCallOnNullableType:
    active: true
  EqualsAlwaysReturnsTrueOrFalse:
    active: true
  ExplicitGarbageCollectionCall:
    active: true
  IteratorHasNextCallsNextMethod:
    active: true
  IteratorNotThrowingNoSuchElementException:
    active: true
  UnreachableCode:
    active: true
  UselessPostfixExpression:
    active: true

style:
  active: true
  MagicNumber:
    active: false  # too noisy for this codebase
  ReturnCount:
    active: true
    max: 3
  UnusedImports:
    active: true
  UnusedPrivateMember:
    active: true
  ForbiddenComment:
    active: true
    comments:
      - reason: 'Unresolved issue'
        value: 'FIXME:'
      - reason: 'Do not ship'
        value: 'STOPSHIP:'

formatting:
  active: true
  android: false
  autoCorrect: false
  MaxLineLength:
    active: true
    maxLineLength: 140
  NoWildcardImports:
    active: true
  TrailingCommaOnCallSite:
    active: false
  TrailingCommaOnDeclarationSite:
    active: false

pre-push:
  commands:
    compile:
      glob: "*.{kt,kts}"
      # compileKotlinJvm covers the KMP core; compileKotlin the JVM-only modules.
      run: ./gradlew compileKotlin compileKotlinJvm
    coverage:
      glob: "*.{kt,kts}"
      run: ./gradlew :bpmn-to-code-core:jacocoTestCoverageVerification
    detekt:
      glob: "*.{kt,kts}"
      run: ./gradlew detekt

# git-cliff configuration — used to (re)generate the historical CHANGELOG.md.
# Going forward, release-please owns CHANGELOG.md and prepends new entries on top.

[changelog]
header = """
# Changelog

All notable changes to this project are documented here.
This file was bootstrapped from git history with [git-cliff](https://git-cliff.org);
new entries are appended automatically by [release-please](https://github.com/googleapis/release-please).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Tests" },
  { message = "^build\\(deps\\)", group = "Dependencies" },
  { message = "^build\\(deps-dev\\)", group = "Dependencies" },
  { message = "^build", group = "Build" },
  { message = "^ci", group = "CI" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^release", skip = true },
  { message = "^chore", skip = true },
]
filter_commits = true
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
sort_commits = "oldest"
